{% extends 'base.html' %}

{% block title %}Guestbook{% endblock %}

{% block content %}
    <h1>Tell us your name!</h1>
    
    <form action="{{ url_for('greet') }}" method="POST">
        <label for="name-input">Your Name:</label>
        <input type="text" id="name-input" name="user_name" required>
        <button type="submit">Submit</button>
    </form>

    <hr>

    <h2>People Who Visited:</h2>
    <ul>
        {% for visitor in visitors %}
            <li style="margin-bottom: 10px;">
                {{ visitor.name }} 
                
                <!-- Each name gets its own mini-form to trigger the delete route -->
                <form action="{{ url_for('delete_visitor', visitor_id=visitor.id) }}" method="POST" style="display: inline; margin-left: 10px;">
                    <button type="submit" style="background: #e74c3c; color: white; border: none; padding: 2px 8px; cursor: pointer; border-radius: 3px;">
                        Delete
                    </button>
                </form>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
